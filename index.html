<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Horas</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,Arial,sans-serif;background:#f2f4f8;color:#1a1a2e;min-height:100vh}
    .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #eef2f6;position:sticky;top:0}
    .sidebar{position:fixed;left:0;top:0;width:240px;height:100%;padding:20px;background:#fff;border-right:1px solid #eef2f6;transform:translateX(-260px);transition:transform .2s}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0;padding:20px}
    @media(min-width:768px){.main{margin-left:240px}}
    .tarjeta{background:#fff;border-radius:12px;padding:16px;border:1px solid #eef2f6;margin-bottom:16px}
    .hora-row{display:flex;gap:8px;align-items:center}
    .hora-input{padding:8px 10px;border-radius:8px;border:1px solid #e6e9ef;min-width:120px;text-align:center}
    .btn{padding:8px 12px;border-radius:10px;border:0;cursor:pointer}
    .btn-guardar{background:#0066cc;color:#fff}
    #notificaciones{position:fixed;right:16px;top:72px;z-index:50}
  </style>
</head>
<body>
  <header class="header">
    <button id="btnMenu">☰</button>
    <h1 style="font-size:1rem;margin-left:8px">Registro de Horas</h1>
    <div style="display:flex;gap:12px;align-items:center"><div id="fecha"></div><div id="hora">--:--:--</div></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <div style="font-weight:700;margin-bottom:12px">Menú</div>
    <nav>
      <a href="#" data-tab="resumen">Resumen</a><br>
      <a href="#" data-tab="registro">Registro</a><br>
      <a href="#" data-tab="lista">Lista</a>
    </nav>
  </aside>

  <main class="main" id="main">
    <div id="notificaciones"></div>

    <section id="resumen" class="tarjeta">
      <div style="font-weight:700;margin-bottom:8px">Últimos registros</div>
      <div id="ultimos">No hay registros</div>
    </section>

    <section id="registro" class="tarjeta" style="display:none">
      <div style="font-weight:700;margin-bottom:8px">Nuevo registro</div>
      <label>Fecha</label>
      <input type="date" id="inputFecha" style="display:block;margin:8px 0">
      <label>Hora entrada</label>
      <div class="hora-row"><button class="btn" data-aj="-15" data-target="entrada">−</button><input class="hora-input" id="entrada" value="08:00 AM"><button class="btn" data-aj="15" data-target="entrada">+</button></div>
      <label style="margin-top:8px">Hora salida</label>
      <div class="hora-row"><button class="btn" data-aj="-15" data-target="salida">−</button><input class="hora-input" id="salida" value="05:00 PM"><button class="btn" data-aj="15" data-target="salida">+</button></div>
      <div style="margin-top:10px"><button id="guardar" class="btn btn-guardar">Guardar</button><button id="limpiar" class="btn" style="margin-left:8px">Limpiar</button></div>
    </section>

    <section id="lista" class="tarjeta" style="display:none">
      <div style="font-weight:700;margin-bottom:8px">Registros</div>
      <div id="listado">No hay registros</div>
    </section>
  </main>

  <script>
    (function(){
      var btnMenu=document.getElementById('btnMenu'),sidebar=document.getElementById('sidebar'); btnMenu.addEventListener('click',function(){sidebar.classList.toggle('open')});
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault(); var t=this.dataset.tab; document.getElementById('resumen').style.display='none'; document.getElementById('registro').style.display='none'; document.getElementById('lista').style.display='none'; document.getElementById(t).style.display='block'; sidebar.classList.remove('open'); })});

      // Time helpers
      function parse12(s){var m=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i); if(!m) return null; var h=+m[1],mn=+m[2],amp=m[3].toUpperCase(); if(amp==='PM'&&h<12)h+=12; if(amp==='AM'&&h===12)h=0; return {h:h,m:mn};}
      function fmt12(h,m){var am=h>=12?'PM':'AM'; var hh=h%12; if(hh===0)hh=12; return hh+':'+String(m).padStart(2,'0')+' '+am;}
      function addMin(obj,min){var d=new Date(); d.setHours(obj.h); d.setMinutes(obj.m+min); return {h:d.getHours(),m:d.getMinutes()};}

      document.querySelectorAll('.btn[data-aj]').forEach(function(b){b.addEventListener('click',function(){var target=this.dataset.target,adj=+this.dataset.aj; var input=document.getElementById(target); var t=parse12(input.value)||{h:8,m:0}; var nt=addMin(t,adj); input.value=fmt12(nt.h,nt.m);})});

      // storage
      var KEY='horas_v1'; function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}} function save(arr){localStorage.setItem(KEY,JSON.stringify(arr))}
      function render(){var arr=load(); if(arr.length===0){document.getElementById('listado').innerHTML='<p>No hay registros</p>'; document.getElementById('ultimos').innerHTML='<p>No hay registros</p>'; return} var tbl='<table style="width:100%"><thead><tr><th>Fecha</th><th>Entrada</th><th>Salida</th><th>Horas</th></tr></thead><tbody>'; arr.forEach(function(r){tbl+='<tr><td>'+r.fecha+'</td><td>'+r.entrada+'</td><td>'+r.salida+'</td><td>'+r.horas.toFixed(2)+'</td></tr>'}); tbl+='</tbody></table>'; document.getElementById('listado').innerHTML=tbl; document.getElementById('ultimos').innerHTML=tbl; }
      document.getElementById('guardar').addEventListener('click',function(){var fecha=document.getElementById('inputFecha').value||new Date().toISOString().slice(0,10); var e=document.getElementById('entrada').value,s=document.getElementById('salida').value; var te=parse12(e),ts=parse12(s); if(!te||!ts){alert('Introduce horarios en formato hh:mm AM/PM'); return} var d1=new Date(); d1.setHours(te.h); d1.setMinutes(te.m); var d2=new Date(); d2.setHours(ts.h); d2.setMinutes(ts.m); if(d2<=d1) d2.setDate(d2.getDate()+1); var mins=(d2-d1)/60000; var hrs=mins/60; var rec={fecha:fecha,entrada:e,salida:s,horas:hrs}; var arr=load(); arr.push(rec); save(arr); render(); alert('Guardado'); });
      document.getElementById('limpiar').addEventListener('click',function(){document.getElementById('entrada').value='08:00 AM'; document.getElementById('salida').value='05:00 PM'; document.getElementById('inputFecha').value=''});

      // clock
      function tick(){var d=new Date(); document.getElementById('hora').textContent=d.toLocaleTimeString(); document.getElementById('fecha').textContent=d.toLocaleDateString()}
      setInterval(tick,1000); tick(); render();
    })();
  </script>
</body>
</html>
